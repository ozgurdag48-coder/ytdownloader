<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF'ten Online & Word Test Oluşturucu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-md border border-gray-100">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-600 mb-6">📄 PDF'ten Online & Word Test Oluşturucu</h1>
        
        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">1. Gemini API Anahtarınız:</label>
                <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <p class="text-xs text-gray-500 mt-1">Anahtarınız güvenlidir, hiçbir sunucuya kaydedilmez. Sadece tarayıcınızda çalışır.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">2. PDF Dosyası Seçin:</label>
                <input type="file" id="pdfFile" accept=".pdf" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition hidden">
                🔄 Test Oluştur (5 Şıklı)
            </button>
        </div>

        <div id="loading" class="hidden text-center py-4">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-600 rounded-full mb-2"></div>
            <p class="text-sm text-gray-600">Yapay zeka soruları hazırlıyor, lütfen bekleyin...</p>
        </div>

        <hr class="border-gray-200 my-6">

        <div id="testArea" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-gray-900 border-b pb-2">📝 Online Test Alanı</h2>
            <div id="questionsContainer" class="space-y-6"></div>
            
            <button id="submitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition">
                ✔️ Testi Bitir ve Sonuçları Gör
            </button>
            
            <div id="resultBox" class="hidden p-4 rounded-lg text-center font-bold text-lg"></div>

            <hr class="border-gray-200 my-6">

            <div>
                <h2 class="text-xl font-bold text-gray-900 mb-3">💾 Cihaza Kaydet</h2>
                <button id="downloadWordBtn" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-semibold py-3 rounded-lg transition">
                    📥 Testi Word (DOCX) Olarak İndir
                </button>
            </div>
        </div>
    </div>
